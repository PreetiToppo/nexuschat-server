# Server
server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/nexuschat

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.client-type=lettuce
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

# App name
spring.application.name=nexuschat-server

# WebSocket
spring.websocket.server.path=/ws

jwt.secret=${JWT_SECRET:nexuschat-super-secret-key-minimum-256-bits-long!!}
ai.groq.api-key=${AI_GROQ_API_KEY:}
# Model ? llama-3.1-8b-instant is free, fast (~500ms), and handles this task well
# Other free options: llama-3.3-70b-versatile, gemma2-9b-it, mixtral-8x7b-32768
ai.groq.model=llama-3.1-8b-instant
# Required for SSE streaming with Spring MVC
spring.mvc.async.request-timeout=30000